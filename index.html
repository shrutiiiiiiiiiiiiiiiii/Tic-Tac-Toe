<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="msg-container hide">
    <div class="winner-card">
      <h2 id="msg"></h2>
      <button id="New-btn">🎮 Play Again</button>
    </div>
  </div>

  <main>
    <h1>Tic-Tac-Toe</h1>
    <p class="turn-indicator">Player <span id="current-player">O</span>'s Turn</p>

    <div class="container">
      <div class="game">
        <button class="box" id="box-1"></button>
        <button class="box" id="box-2"></button>
        <button class="box" id="box-3"></button>
        <button class="box" id="box-4"></button>
        <button class="box" id="box-5"></button>
        <button class="box" id="box-6"></button>
        <button class="box" id="box-7"></button>
        <button class="box" id="box-8"></button>
        <button class="box" id="box-9"></button>
      </div>
      <button id="Reset-btn">🔄 Reset Game</button>
    </div>
  </main>
  <script src="app.js"></script>
</body>

</html>
