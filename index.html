<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="turn-indicator">Current Player: <span id="current-player">O</span></div>
        <div class="game">
            <button class="box" id="box-1"></button>
            <button class="box" id="box-2"></button>
            <button class="box" id="box-3"></button>
            <button class="box" id="box-4"></button>
            <button class="box" id="box-5"></button>
            <button class="box" id="box-6"></button>
            <button class="box" id="box-7"></button>
            <button class="box" id="box-8"></button>
            <button class="box" id="box-9"></button>
        </div>
        <button id="Reset-btn">Reset</button>
        <button id="New-btn">New Game</button>
    </div>

    <div class="msg-container hide">
        <div class="winner-card">
            <h2 id="msg"></h2>
            <button id="New-btn">Play Again</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
